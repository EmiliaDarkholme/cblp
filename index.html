<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Будь моей валентинкой!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffe6ea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(#ffccd5 2px, transparent 2px),
                radial-gradient(#ffccd5 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        .container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            padding: 40px 30px;
            text-align: center;
            max-width: 700px;
            width: 100%;
            position: relative;
            overflow: hidden;
            border: 8px solid #ff4d6d;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }

        .heart-decoration {
            position: absolute;
            color: #ff4d6d;
            font-size: 24px;
            opacity: 0.7;
        }

        .heart-1 { top: 15px; left: 15px; }
        .heart-2 { top: 15px; right: 15px; }
        .heart-3 { bottom: 15px; left: 15px; }
        .heart-4 { bottom: 15px; right: 15px; }

        h1 {
            color: #ff4d6d;
            font-size: 2.8rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px #ffccd5;
            padding: 0 10px;
            line-height: 1.2;
        }

        .success-message {
            font-size: 2.2rem;
            color: #ff4d6d;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 1px 1px 0 #ffccd5;
            display: none;
            padding: 0 20px;
            text-align: center;
            min-height: 40px;
        }

        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gif-main-container {
            width: 100%;
            max-width: 400px;
            height: 300px; /* Фиксированная высота */
            margin: 10px 0 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            background-color: #fff;
        }

        .gif-main-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Сохраняет пропорции и заполняет контейнер */
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .buttons-wrapper {
            width: 100%;
            margin-top: 5px;
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 0 auto;
            position: relative;
            min-height: 120px;
            max-width: 600px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.4rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
        }

        .yes-btn {
            background-color: #ff4d6d;
            color: white;
            min-width: 150px;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .yes-btn:hover {
            background-color: #ff3355;
        }

        .no-btn {
            background-color: #4d79ff;
            color: white;
            min-width: 150px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .no-btn:hover {
            background-color: #3366ff;
        }

        .no-btn.moving {
            position: absolute;
        }

        .footer-note {
            margin-top: 25px;
            color: #999;
            font-size: 0.9rem;
            text-align: center;
            padding: 0 20px;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
                margin-bottom: 15px;
            }

            .success-message {
                font-size: 1.8rem;
                margin-bottom: 15px;
            }

            .container {
                padding: 30px 20px;
                margin: 15px 0;
            }

            .gif-main-container {
                max-width: 350px;
                height: 260px; /* Уменьшенная фиксированная высота для планшетов */
                margin: 5px 0 20px;
            }

            .buttons-container {
                gap: 25px;
                flex-direction: column;
                min-height: 180px;
            }

            .btn {
                padding: 10px 25px;
                font-size: 1.3rem;
                min-width: 140px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }

            .success-message {
                font-size: 1.6rem;
            }

            .container {
                padding: 25px 15px;
                border-width: 6px;
            }

            .gif-main-container {
                max-width: 300px;
                height: 220px; /* Уменьшенная фиксированная высота для телефонов */
                margin: 5px 0 15px;
            }

            .btn {
                padding: 8px 20px;
                font-size: 1.1rem;
                min-width: 120px;
            }

            .buttons-container {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart-decoration heart-1">❤</div>
        <div class="heart-decoration heart-2">❤</div>
        <div class="heart-decoration heart-3">❤</div>
        <div class="heart-decoration heart-4">❤</div>

        <h1>Ты будешь моей валентинкой?</h1>

        <div class="success-message" id="successMessage">Урааааа! ❤️❤️❤️</div>

        <div class="main-content">
            <div class="gif-main-container">
                <img id="mainGif" src="" alt="Милая валентинка">
            </div>

            <div class="buttons-wrapper">
                <div class="buttons-container" id="buttonsContainer">
                    <button class="btn yes-btn" id="yesBtn">ДА!</button>
                    <button class="btn no-btn" id="noBtn">Нет</button>
                </div>
            </div>
        </div>

        <div class="footer-note">️</div>
    </div>

    <script>
        // ============================================
        // НАСТРОЙКИ ГИФОК - ЗАМЕНИТЕ ССЫЛКИ НА СВОИ!
        // ============================================
        const GIF_SETTINGS = {
            // Основная гифка (показывается при загрузке)
            mainGif: "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3RtZWRvNGduY3A2c2E4azJicmczNjAxMmtiMmV3azN6NTJpbTV4NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/qFmdpUKAFZ6rMobzzu/giphy.gif",

            // Гифки при нажатии "Нет" (меняются по очереди)
            noGifs: [
                "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExemVqdmVpMXR0YTg1cWNiNTBmNHp0bHByNW4yanVsaWJod2NudmVvMSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/VVNQZ0ExDd5RjYKiTs/giphy.gif",
                "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExajU5aGUyaGl2czJ0N3d4MGtsMGtnOW1wdDQ5eGc1OTVmM2o4MXVqYyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/NgdYARNcpEd0WsMExy/giphy.gif",
                "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3ZWJiNHYxa2p0MHdieGM3bDh6M2FwdnRycmx3N2hqbDBmdmRxa2xleCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/JC18kVGLrm38gvhIf1/giphy.gif",
                "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3N2NzeWk3ZnRkaDlrZXpuZ25veXcydjBjZHkxNGd2djNzNG0zd3JnNiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/eEq8SAwQDAKZm9nyQZ/giphy.gif",
                "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3ZWJiNHYxa2p0MHdieGM3bDh6M2FwdnRycmx3N2hqbDBmdmRxa2xleCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/xXqpuURrhGEyZr1BGj/giphy.gif",
                "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3ZW00dGF0emY4ZmhxN2NiODgyMTF2MjdhNTZpNGpiaGJ5MnBsdHRzaCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/LAqYF8Nyk9w54oyOQj/giphy.gif",
                "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MG9xYXY2enR5dTB4cDhyZ3FlaGFvdGNtaGxyNnlia3NvOGNqdGl4byZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3HoD5P4FOOIMJppHeS/giphy.gif",
                "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MWY0NXk2aWRwbXBmczMxNzZlZTJrYjk5MDc4Z3poanNxODNod3RzdSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/cFZyW6aWwV1kPs4h3Z/giphy.gif",
                "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3YnR1andoNTJpd3U5N3lkZGQ2cXM4NjJpc3MwZmFraXRkNHluZnlsbCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/Y4gYNdUV3twZYy9jAG/giphy.gif",
                "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYXNnbGpybm92djl3a284cXZhc3NydXVzcG9hN2lyenNoY3doZ29tbCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/c2IZ3fB0rmRXy/giphy.gif"
            ],

            // Праздничная гифка (при нажатии ДА)
            celebrationGif: "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExNGtuM3gwZmRibzBkaDFlemhvNnkxOWhjMGQzamc1NDA4amw5NDZteCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Rik9n81Vda3rzr5F8h/giphy.gif",

            // Альтернативная праздничная гифка (если нужна замена)
            altCelebrationGif: "https://media.giphy.com/media/26tknCqiJrBQG6DrC/giphy.gif"
        };

        // ============================================
        // ОСНОВНОЙ КОД
        // ============================================

        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainGif = document.getElementById('mainGif');
        const successMessage = document.getElementById('successMessage');
        const buttonsContainer = document.getElementById('buttonsContainer');

        // Список текстов для кнопки "Нет"
        const noButtonTexts = [
            "Подумай ещё",
            "Неправильный ответ",
            "Ты уверена?",
            "Пожалуйста!",
            "Не торопись",
            "Ещё раз подумай",
            "Это ошибка!",
            "Давай по-хорошему",
            "Я буду грустить",
            "Точно нет?"
        ];

        let noClickCount = 0;
        let yesSize = 1;
        let isFirstClick = true;
        let noBtnRemoved = false;
        let yesBtnRect = null;
        let currentNoGifIndex = 0;

        // Инициализация гифок
        function initializeGifs() {
            // Устанавливаем основную гифку
            mainGif.src = GIF_SETTINGS.mainGif;
            mainGif.style.display = 'block';

            console.log("Гифки загружены:");
            console.log("- Основная гифка:", GIF_SETTINGS.mainGif);
            console.log("- Гифки при 'Нет':", GIF_SETTINGS.noGifs.length, "штук");
            console.log("- Праздничная гифка:", GIF_SETTINGS.celebrationGif);
            console.log("Чтобы заменить гифки, измените ссылки в разделе GIF_SETTINGS");
        }

        // Показать гифку при нажатии "Нет"
        function showNoGif() {
            // Берем следующую гифку из списка
            const gifUrl = GIF_SETTINGS.noGifs[currentNoGifIndex % GIF_SETTINGS.noGifs.length];
            mainGif.src = gifUrl;

            // Увеличиваем индекс для следующего раза
            currentNoGifIndex++;

            // Добавляем небольшую анимацию
            mainGif.style.transform = 'scale(0.95)';
            setTimeout(() => {
                mainGif.style.transform = 'scale(1)';
                mainGif.style.transition = 'transform 0.3s ease';
            }, 100);

            console.log("Показана гифка для 'Нет':", gifUrl);
        }

        // Показать праздничную гифку
        function showCelebrationGif() {
            mainGif.src = GIF_SETTINGS.celebrationGif;

            // Анимация появления
            mainGif.style.transform = 'scale(1.05)';
            setTimeout(() => {
                mainGif.style.transform = 'scale(1)';
                mainGif.style.transition = 'transform 0.5s ease';
            }, 200);

            console.log("Показана праздничная гифка:", GIF_SETTINGS.celebrationGif);
        }

        // Показать гифку сразу при загрузке
        window.addEventListener('load', function() {
            initializeGifs();
            // Получаем позицию кнопки "Да"
            updateYesButtonPosition();
        });

        // Обновляем позицию кнопки "Да" при ресайзе
        window.addEventListener('resize', updateYesButtonPosition);

        // Обработчик для кнопки "Да"
        yesBtn.addEventListener('click', function() {
            if (noBtnRemoved) {
                // Если кнопка "Нет" удалена (после 10 нажатий)
                successMessage.textContent = "Правильный ответ ❤️";
            } else {
                successMessage.textContent = "Правильный ответ ❤️";
            }

            // Показать сообщение
            successMessage.style.display = 'block';

            // Показать праздничную гифку
            showCelebrationGif();

            // Спрятать кнопки
            yesBtn.style.display = 'none';
            if (!noBtnRemoved) {
                noBtn.style.display = 'none';
            }

            // Добавить праздничные стили
            document.body.style.backgroundImage = "none";
            document.body.style.backgroundColor = "#ffebee";

            // Создать падающие сердца
            createFallingHearts();
        });

        // Обработчик для кнопки "Нет"
        noBtn.addEventListener('mouseover', function() {
            if (isFirstClick) {
                return; // Не перемещаем при первом наведении
            }
            moveNoButton();
        });

        noBtn.addEventListener('click', function() {
            noClickCount++;

            // Меняем гифку при каждом нажатии "Нет"
            showNoGif();

            if (noClickCount === 1) {
                // После первого нажатия кнопка "Нет" начинает перемещаться
                isFirstClick = false;
                noBtn.classList.add('moving');
                moveNoButton();
                changeNoButtonText();
                increaseYesButton();
                return;
            }

            if (noClickCount < 10) {
                // Обычное поведение: перемещение, смена текста, увеличение "Да"
                moveNoButton();
                changeNoButtonText();
                increaseYesButton();
            } else if (noClickCount === 10) {
                // После 10 нажатий удаляем кнопку "Нет" и меняем текст "Да"
                removeNoButton();
                changeYesButtonText();
            }
        });

        // Функция для обновления позиции кнопки "Да"
        function updateYesButtonPosition() {
            const rect = yesBtn.getBoundingClientRect();
            const containerRect = buttonsContainer.getBoundingClientRect();

            yesBtnRect = {
                left: rect.left - containerRect.left,
                top: rect.top - containerRect.top,
                right: rect.right - containerRect.left,
                bottom: rect.bottom - containerRect.top,
                width: rect.width,
                height: rect.height
            };
        }

        // Функция для перемещения кнопки "Нет"
        function moveNoButton() {
            if (!noBtn.classList.contains('moving')) return;

            const containerWidth = buttonsContainer.offsetWidth;
            const containerHeight = buttonsContainer.offsetHeight;
            const buttonWidth = noBtn.offsetWidth;
            const buttonHeight = noBtn.offsetHeight;

            // Безопасная зона вокруг кнопки "Да"
            const safeZonePadding = 20;

            let randomX, randomY;
            let attempts = 0;
            const maxAttempts = 100;

            do {
                // Генерируем случайные координаты в пределах контейнера
                const maxX = containerWidth - buttonWidth;
                const maxY = containerHeight - buttonHeight;

                randomX = Math.floor(Math.random() * Math.max(0, maxX));
                randomY = Math.floor(Math.random() * Math.max(0, maxY));

                attempts++;

                // Проверяем, не пересекается ли позиция с кнопкой "Да"
                const noBtnLeft = randomX;
                const noBtnRight = randomX + buttonWidth;
                const noBtnTop = randomY;
                const noBtnBottom = randomY + buttonHeight;

                const yesBtnLeft = yesBtnRect.left - safeZonePadding;
                const yesBtnRight = yesBtnRect.right + safeZonePadding;
                const yesBtnTop = yesBtnRect.top - safeZonePadding;
                const yesBtnBottom = yesBtnRect.bottom + safeZonePadding;

                // Проверка пересечения
                const isOverlapping = !(
                    noBtnRight < yesBtnLeft ||
                    noBtnLeft > yesBtnRight ||
                    noBtnBottom < yesBtnTop ||
                    noBtnTop > yesBtnBottom
                );

                // Если не пересекается, выходим из цикла
                if (!isOverlapping) break;

            } while (attempts < maxAttempts);

            // Устанавливаем новую позицию кнопки
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        // Функция для изменения текста кнопки "Нет"
        function changeNoButtonText() {
            const randomIndex = Math.floor(Math.random() * noButtonTexts.length);
            noBtn.textContent = noButtonTexts[randomIndex];
        }

        // Функция для увеличения кнопки "Да"
        function increaseYesButton() {
            yesSize += 0.15;
            yesBtn.style.transform = `scale(${yesSize})`;

            // Обновляем позицию после увеличения
            setTimeout(updateYesButtonPosition, 50);
        }

        // Функция для удаления кнопки "Нет"
        function removeNoButton() {
            noBtnRemoved = true;

            // Анимация исчезновения кнопки "Нет"
            noBtn.style.opacity = '0';
            noBtn.style.pointerEvents = 'none';
            noBtn.style.transition = 'opacity 0.5s ease';

            // Через 0.5 секунд полностью удаляем кнопку
            setTimeout(() => {
                noBtn.style.display = 'none';
            }, 500);
        }

        // Функция для изменения текста кнопки "Да"
        function changeYesButtonText() {
            yesBtn.textContent = "У тебя уже нет выбора";
            yesBtn.style.fontSize = '1.2rem';
            yesBtn.style.padding = '10px 25px';

            // Делаем кнопку "Да" еще больше
            yesSize += 0.3;
            yesBtn.style.transform = `scale(${yesSize})`;

            // Обновляем позицию после изменения
            setTimeout(updateYesButtonPosition, 50);
        }

        // Функция для создания падающих сердечек
        function createFallingHearts() {
            const colors = ['#ff4d6d', '#ff8fa3', '#ffb3c1', '#ffccd5'];

            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '❤';
                    heart.style.position = 'fixed';
                    heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                    heart.style.fontSize = Math.floor(Math.random() * 30 + 20) + 'px';
                    heart.style.left = Math.floor(Math.random() * 100) + 'vw';
                    heart.style.top = '-50px';
                    heart.style.zIndex = '9999';
                    heart.style.pointerEvents = 'none';
                    heart.style.opacity = '0.7';

                    document.body.appendChild(heart);

                    // Анимация падения
                    const animation = heart.animate([
                        { transform: 'translateY(0) rotate(0deg)', opacity: 0.7 },
                        { transform: `translateY(${window.innerHeight + 100}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                    ], {
                        duration: Math.random() * 3000 + 2000,
                        easing: 'cubic-bezier(0.215, 0.610, 0.355, 1)'
                    });

                    // Удалить сердечко после анимации
                    animation.onfinish = () => {
                        document.body.removeChild(heart);
                    };
                }, i * 100);
            }
        }
    </script>
</body>
</html>
